server:
  port: 8081

spring:
  application:
    name: nl2sql-system

  # MySQL Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://***************:3306/nl2sql?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: *****************
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 300000  # 减少空闲超时到5分钟
      max-lifetime: 1790000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      keepalive-time: 300000
      connection-test-query: SELECT 1

  # MyBatis-Plus Configuration
  mybatis-plus:
    mapper-locations: classpath:mapper/*.xml
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: auto
        logic-delete-field: deleted
        logic-delete-value: 1
        logic-not-delete-value: 0

  # Neo4j Configuration
  neo4j:
    uri: **************
    authentication:
      username: ***********
      password: ***********

  # Redis Configuration
  data:
    redis:
      host: *****************
      port: 6379
      password: ***************
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # Jackson Configuration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# Milvus Configuration
milvus:
  host: **********
  port: 19530
  database: default
  collection:
    table-vectors: table_vectors
    field-vectors: field_vectors
    query-vectors: query_vectors
  embedding:
    dimension: 768

# NL2SQL Configuration
nl2sql:
  # LLM Configuration
  llm:
    provider: deepseek
    deepseek:
      api-key: ******************
      model: deepseek-chat
      base-url: https://api.deepseek.com/v1
      max-tokens: 4000
      temperature: 0.1
      timeout: 30000
    qwen:
      api-key: **************
      model: qwen-turbo
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      max-tokens: 4000
      temperature: 0.1
      timeout: 30000

  # Cache Configuration
  cache:
    enabled: true
    expire-minutes: 30
    max-size: 1000

  # Query Configuration
  query:
    max-result-rows: 1000
    timeout-seconds: 30
    sql-retry-count: 2
    enable-explain: true

  # Vector Search Configuration
  vector:
    topk: 10
    field-topk: 5
    similarity-threshold: 0.7
  schema:
    max-tables: 50
    max-fields-per-table: 30
    # 向量不可用时回退：避免大库一次性带入过多表/字段
    fallback-max-tables: 12
    fallback-max-fields-per-table: 12
    # 精简模式下外键扩展的关联表数量上限
    max-related-tables-compact: 8
    # Schema 迭代优化：AI驱动二次检索轮数与上下文长度限制
    refine-rounds: 2
    max-context-chars: 12000
    refine-max-keywords: 8

# JWT Configuration
jwt:
  secret: XbJjKzRqWvNtYpLmHcGfEdSaQwUoIxPnMkLjZhVgTfReYdUcBxAwQsEzRxCvNbMa
  expiration: 86400000
  refresh-expiration: 604800000

# Logging Configuration
logging:
  level:
    root: INFO
    com.nl2sql: DEBUG
    org.springframework.data.neo4j: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Springdoc Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha